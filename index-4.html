<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>張仕朋｜數位名片</title>
    <meta name="description" content="張仕朋的個人數位名片" />
    <style>
      :root {
        --bg: #f6f7f9;
        --card: rgba(255, 255, 255, 0.86);
        --card-border: rgba(15, 23, 42, 0.08);
        --text: #0f172a;
        --muted: rgba(15, 23, 42, 0.68);
        --shadow: 0 18px 48px rgba(2, 8, 23, 0.1);
        --btn: rgba(15, 23, 42, 0.06);
        --btn-hover: rgba(15, 23, 42, 0.1);
        --ring: rgba(59, 130, 246, 0.35);
      }

      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", system-ui, sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      .bg {
        position: fixed;
        inset: 0;
        z-index: 0;
        pointer-events: none;
      }

      .bg-layer {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 520ms cubic-bezier(0.2, 0.8, 0.2, 1);
        will-change: opacity;
      }

      .bg-layer.is-active { opacity: 1; }

      .stage {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 28px 18px;
        position: relative;
        z-index: 1;
      }

      .hint {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 12px;
        color: rgba(15, 23, 42, 0.45);
        letter-spacing: 0.02em;
        user-select: none;
        pointer-events: none;
      }

      .card {
        width: min(520px, 100%);
        border-radius: 18px;
        background: var(--card);
        border: 1px solid var(--card-border);
        box-shadow: var(--shadow);
        padding: 28px 22px 22px;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
      }

      .avatar {
        width: 120px;
        height: 120px;
        border-radius: 999px;
        margin: 0 auto 16px;
        border: 1px solid rgba(15, 23, 42, 0.1);
        background: rgba(255, 255, 255, 0.6);
        display: grid;
        place-items: center;
        position: relative;
        overflow: hidden;
      }

      .avatar img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: cover;
        object-position: center;
        position: relative;
        z-index: 1;
      }

      .avatar::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at 40% 20%, rgba(255, 255, 255, 0.85), transparent 42%);
        opacity: 0.18;
        z-index: 0;
        pointer-events: none;
      }

      h1 {
        margin: 0;
        text-align: center;
        font-size: 26px;
        font-weight: 720;
        letter-spacing: 0.02em;
      }

      .subtitle {
        margin: 10px 0 18px;
        text-align: center;
        color: var(--muted);
        line-height: 1.6;
        font-size: 14px;
      }

      .links {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 6px;
      }

      .btn {
        appearance: none;
        border: 1px solid rgba(15, 23, 42, 0.1);
        background: var(--btn);
        color: rgba(15, 23, 42, 0.86);
        border-radius: 999px;
        padding: 10px 12px;
        font-size: 14px;
        text-decoration: none;
        text-align: center;
        transition: transform 140ms ease, background 140ms ease, border-color 140ms ease;
        user-select: none;
      }

      .btn:hover { background: var(--btn-hover); transform: translateY(-1px); }
      .btn:active { transform: translateY(0); }
      .btn:focus-visible { outline: none; box-shadow: 0 0 0 4px var(--ring); }

      .footer {
        margin-top: 16px;
        text-align: center;
        font-size: 12px;
        color: rgba(15, 23, 42, 0.46);
      }

      @media (max-width: 420px) {
        .card { padding: 24px 18px 18px; }
        .links { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="bg" aria-hidden="true">
      <div class="bg-layer is-active" id="bgA"></div>
      <div class="bg-layer" id="bgB"></div>
    </div>

    <main class="stage" id="stage">
      <div class="hint">點擊背景：隨機切換藍色系</div>

      <section class="card" aria-label="個人數位名片">
        <div class="avatar" aria-label="大頭照" id="avatar">
          <img id="avatarImg" alt="張仕朋的大頭照" />
        </div>

        <h1>張仕朋</h1>
        <p class="subtitle">我是熱愛音樂的北醫醫學系學生</p>

        <nav class="links" aria-label="社群連結">
          <a class="btn" href="#" target="_blank" rel="noreferrer noopener">Instagram</a>
          <a class="btn" href="#" target="_blank" rel="noreferrer noopener">YouTube</a>
          <a class="btn" href="#" target="_blank" rel="noreferrer noopener">GitHub</a>
        </nav>

        <div class="footer">© <span id="year"></span> 張仕朋</div>
      </section>
    </main>

    <script>
      const stage = document.getElementById("stage");
      const yearEl = document.getElementById("year");
      yearEl.textContent = String(new Date().getFullYear());

      const avatarEl = document.getElementById("avatar");
      const avatarImg = document.getElementById("avatarImg");
      const bgA = document.getElementById("bgA");
      const bgB = document.getElementById("bgB");

      const blueThemes = [
        { a: "#0b1020", b: "#0ea5e9", c: "#60a5fa" },
        { a: "#071021", b: "#1d4ed8", c: "#22d3ee" },
        { a: "#0a122a", b: "#3b82f6", c: "#a5b4fc" },
        { a: "#071426", b: "#2563eb", c: "#93c5fd" },
        { a: "#041022", b: "#0ea5e9", c: "#38bdf8" },
        { a: "#0a0f1f", b: "#1e40af", c: "#67e8f9" },
        { a: "#0a1220", b: "#0284c7", c: "#818cf8" },
        { a: "#070f2a", b: "#4f46e5", c: "#38bdf8" },
      ];

      function themeToCss(t) {
        return `
          radial-gradient(900px circle at 12% 18%, color-mix(in oklab, ${t.c} 35%, transparent), transparent 55%),
          radial-gradient(720px circle at 82% 70%, color-mix(in oklab, ${t.b} 38%, transparent), transparent 58%),
          linear-gradient(135deg, ${t.a}, color-mix(in oklab, ${t.b} 45%, ${t.a}), ${t.b})
        `.trim();
      }

      function pickDifferent(current, options) {
        if (!options.length) return current;
        if (options.length === 1) return options[0];
        let next = current;
        while (next === current) next = options[Math.floor(Math.random() * options.length)];
        return next;
      }

      function applyBackgroundTheme(theme) {
        const activeIsA = bgA.classList.contains("is-active");
        const incoming = activeIsA ? bgB : bgA;
        const outgoing = activeIsA ? bgA : bgB;
        incoming.style.background = themeToCss(theme);
        incoming.classList.add("is-active");
        outgoing.classList.remove("is-active");
      }

      function cycleBlue() {
        const lastIdx = Number(document.body.dataset.bgIdx || "-1");
        const nextIdx = pickDifferent(lastIdx, blueThemes.map((_, i) => i));
        document.body.dataset.bgIdx = String(nextIdx);
        applyBackgroundTheme(blueThemes[nextIdx]);
      }

      function xmur3(str) {
        let h = 1779033703 ^ str.length;
        for (let i = 0; i < str.length; i++) {
          h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
          h = (h << 13) | (h >>> 19);
        }
        return function () {
          h = Math.imul(h ^ (h >>> 16), 2246822507);
          h = Math.imul(h ^ (h >>> 13), 3266489909);
          h ^= h >>> 16;
          return h >>> 0;
        };
      }

      function mulberry32(seed) {
        return function () {
          let t = (seed += 0x6d2b79f5);
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

      function makeAvatarSvg({ name, variantSeed }) {
        const seedFn = xmur3(`${name}::${variantSeed}`);
        const rand = mulberry32(seedFn());

        const hueBase = Math.floor(205 + rand() * 40);
        const h1 = clamp(hueBase + Math.floor(rand() * 14 - 7), 180, 260);
        const h2 = clamp(hueBase + Math.floor(rand() * 28 - 14), 180, 260);
        const h3 = clamp(hueBase + Math.floor(rand() * 34 - 17), 180, 260);

        const c1 = `hsl(${h1} 78% 58%)`;
        const c2 = `hsl(${h2} 88% 52%)`;
        const c3 = `hsl(${h3} 72% 64%)`;

        const blobs = Array.from({ length: 4 }, () => {
          const cx = 20 + rand() * 80;
          const cy = 18 + rand() * 84;
          const r = 18 + rand() * 26;
          const o = 0.16 + rand() * 0.22;
          const col = rand() < 0.5 ? c2 : c3;
          return { cx, cy, r, o, col };
        });

        const initial = (name || "A").trim().slice(0, 1);

        const svg = `
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="${c1}"/>
      <stop offset="0.55" stop-color="${c2}"/>
      <stop offset="1" stop-color="${c3}"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" />
    </filter>
  </defs>
  <rect width="240" height="240" rx="120" fill="url(#g)"/>
  ${blobs
    .map(
      (b) =>
        `<circle cx="${b.cx * 2.4}" cy="${b.cy * 2.4}" r="${b.r * 2.4}" fill="${b.col}" opacity="${b.o}" filter="url(#soft)"/>`,
    )
    .join("\n  ")}
  <circle cx="120" cy="120" r="108" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2"/>
  <text x="120" y="138" text-anchor="middle" font-size="88" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', sans-serif" fill="rgba(255,255,255,0.86)" style="font-weight:700; letter-spacing: 0.02em;">${initial}</text>
</svg>`.trim();

        return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
      }

      function setAvatarFallback(name, variantSeed = "0") {
        const url = makeAvatarSvg({ name, variantSeed });
        avatarImg.style.display = "none";
        avatarImg.removeAttribute("src");
        avatarEl.style.backgroundImage = `url("${url}")`;
        avatarEl.style.backgroundSize = "cover";
        avatarEl.style.backgroundPosition = "center";
      }

      function setAvatarPhoto(relativePath) {
        avatarEl.style.backgroundImage = "none";
        avatarImg.style.display = "block";
        // Break cache so the updated avatar.png is visible.
        const sep = relativePath.includes("?") ? "&" : "?";
        avatarImg.src = `${relativePath}${sep}v=${Date.now()}`;
      }

      // Embedded avatar (single-file portability): upload/download won't lose the photo.
      // Note: even though the filename is .png, the current file content is JPEG-encoded.

      const avatarCandidates = ["./assets/avatar.png", "../assets/avatar.png", "assets/avatar.png"];

      function tryLoadAvatar(i = -1) {
        if (i === -1) {
          avatarImg.onerror = () => tryLoadAvatar(0);
          avatarImg.onload = () => (avatarEl.style.backgroundImage = "none");
          avatarEl.style.backgroundImage = "none";
          avatarImg.style.display = "block";
          avatarImg.src = embeddedAvatarDataUri;
          return;
        }

        if (i >= avatarCandidates.length) {
          setAvatarFallback("張仕朋", "0");
          return;
        }

        const p = avatarCandidates[i];
        avatarImg.onerror = () => tryLoadAvatar(i + 1);
        avatarImg.onload = () => (avatarEl.style.backgroundImage = "none");
        setAvatarPhoto(p);
      }

      cycleBlue();
      tryLoadAvatar(-1);

      stage.addEventListener("click", (e) => {
        const target = e.target;
        if (target && target.closest && target.closest(".card")) return;
        cycleBlue();
      });

      stage.tabIndex = 0;
      stage.addEventListener("keydown", (e) => {
        if (e.key !== "Enter" && e.key !== " ") return;
        const active = document.activeElement;
        if (active && active.closest && active.closest(".card")) return;
        e.preventDefault();
        cycleBlue();
      });
    </script>
